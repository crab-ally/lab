version: "3.8"

# =============================================================================
# AI Safety Patrol Robot
# MuJoCo + ROS2 Humble Simulation Environment
#
# 역할
#   - robot_sim : MuJoCo 시뮬레이션 + ROS2 Bridge
#   - teleop    : 키보드 입력으로 /cmd_vel 발행
#   - db        : 위험 이벤트 및 센서 로그 저장 (Level 6)
#   - dashboard : Grafana 시각화 (Level 6)
#
# ROS2 Topic
#   Subscribe
#       /cmd_vel
#
#   Publish
#       /odom
#       /scan
#       /camera/image_raw
#       /tf
#       /map (slam 서비스 실행 시)
#
# 실행 예시
#
#   [1] MuJoCo 시뮬레이터 실행
#       docker compose up robot_sim
#
#   [2] 키보드 제어 (별도 터미널)
#       docker compose run --rm teleop
#
#   [4] SLAM 지도 생성 (별도 터미널)
#       docker compose --profile slam up slam
#
#   [5] 자동 탐색 매핑 (SLAM 실행 중)
#       docker compose run --rm auto_explore
#
#   [6] 지도 저장 (SLAM 실행 중, 탐색 완료 후)
#       docker compose run --rm map_saver
#
#   [7] 시뮬레이터 + SLAM + Teleop
#       docker compose --profile slam --profile teleop up
# =============================================================================

services:

  # ===========================================================================
  # Robot Simulation
  #
  # MuJoCo Physics Engine
  # + ROS2 Bridge(Node)
  #
  # 기능
  #   - patrol_factory.xml 로드
  #   - 물리 시뮬레이션
  #   - /cmd_vel 구독
  #   - /odom Publish
  #   - /scan Publish
  #   - /camera/image_raw Publish
  # ===========================================================================

  robot_sim:

    # Dockerfile을 이용하여 이미지 생성
    build: .

    # 컨테이너 이름
    container_name: safety_patrol_robot

    # 터미널 입력 허용
    stdin_open: true

    # TTY 활성화
    tty: true

    # OpenGL / MuJoCo 공유 메모리
    ipc: host

    # 프로젝트 폴더 공유
    volumes:

      # SLAM 설정
      - ./config:/workspace/config

      # SLAM 지도 출력 (factory_map.yaml, factory_map.pgm)
      - ./maps:/workspace/maps

      # 원본 데이터
      - ./data:/workspace/data

      # 로봇 모델
      - ./models:/workspace/models

      # 결과 저장
      - ./results:/workspace/results

      # MuJoCo Scene(XML)
      - ./scenes:/workspace/scenes

      # Python Script
      - ./scripts:/workspace/scripts

      # World 파일
      - ./worlds:/workspace/worlds

    environment:

      # =======================================================
      # MuJoCo Rendering
      # =======================================================

      # Windows(VcXsrv) - host.docker.internal:0.0
      # Linux - export DISPLAY=:0
      - DISPLAY=host.docker.internal:0.0

      # GPU가 없으면 0 유지
      - LIBGL_ALWAYS_SOFTWARE=0

      # Qt 공유 메모리 문제 방지
      - QT_X11_NO_MITSHM=1

      # OpenGL Backend - glfw / egl / osmesa
      - MUJOCO_GL=${MUJOCO_GL:-glfw}

      # OpenGL Version
      - MESA_GL_VERSION_OVERRIDE=4.6

      # =======================================================
      # ROS2 DDS
      # =======================================================

      # 같은 Domain ID끼리만 통신
      - ROS_DOMAIN_ID=50

      # DDS Middleware
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

      # =======================================================
      # Database (Level 6)
      # =======================================================

      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=patrol_db
      - DB_USER=admin
      - DB_PASS=password123

    # Database 먼저 실행
    depends_on:
      - db

    # Docker Network
    networks:
      - patrol_network

  # ===========================================================================
  # Teleoperation
  #
  # Keyboard
  #     ↓
  # teleop_twist_keyboard
  #     ↓
  # /cmd_vel
  #     ↓
  # robot_sim
  # ===========================================================================

  teleop:

    build: .

    container_name: safety_patrol_teleop

    # 필요할 때만 실행 (--profile 필요)
    profiles:
      - teleop

    stdin_open: true
    tty: true

    privileged: true

    # Keyboard Teleoperation
    command: >
      bash -c "
      source /opt/ros/humble/setup.bash &&
      ros2 run teleop_twist_keyboard teleop_twist_keyboard --ros-args"

    environment:
      - ROS_DOMAIN_ID=50
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

    depends_on:
      - robot_sim

    networks:
      - patrol_network

  # ===========================================================================
  # SLAM Mapping
  #
  # LiDAR (/scan) + TF + Odometry (/odom)
  #       ↓
  # SLAM Toolbox
  #       ↓
  # Occupancy Grid Map (/map)
  # ===========================================================================

  slam:

    build: .

    container_name: safety_patrol_slam

    profiles:
      - slam

    command: >
      bash -c "
      source /opt/ros/humble/setup.bash &&
      ros2 launch slam_toolbox online_async_launch.py \
      slam_params_file:=/workspace/config/slam_toolbox_factory.yaml \
      use_sim_time:=false"

    volumes:
      - ./config:/workspace/config
      - ./maps:/workspace/maps

    environment:
      - ROS_DOMAIN_ID=50
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

    depends_on:
      - robot_sim

    networks:
      - patrol_network

  # ===========================================================================
  # Auto Explore (SLAM 매핑용 자동 주행)
  # ===========================================================================

  auto_explore:

    build: .

    container_name: safety_patrol_auto_explore

    profiles:
      - slam

    command: >
      bash -c "
      source /opt/ros/humble/setup.bash &&
      python /workspace/scripts/auto_explore_for_mapping.py"

    volumes:
      - ./scripts:/workspace/scripts

    environment:
      - ROS_DOMAIN_ID=50
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

    depends_on:
      - robot_sim
      - slam

    networks:
      - patrol_network

  # ===========================================================================
  # Map Saver
  #
  # 결과: maps/factory_map.yaml, maps/factory_map.pgm
  # ===========================================================================

  map_saver:

    build: .

    container_name: safety_patrol_map_saver

    profiles:
      - slam

    command: >
      bash -c "
      source /opt/ros/humble/setup.bash &&
      python /workspace/scripts/save_factory_map.py
      --output /workspace/maps/factory_map"

    volumes:
      - ./maps:/workspace/maps
      - ./scripts:/workspace/scripts

    environment:
      - ROS_DOMAIN_ID=50
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

    depends_on:
      - slam

    networks:
      - patrol_network

  # ===========================================================================
  # Database
  #
  # TimescaleDB
  #
  # 저장 예정
  #
  #   - 위험 이벤트
  #   - 순찰 로그
  #   - AI 추론 결과
  #   - 센서 데이터
  #
  # 구현 단계
  #
  #   Level 6
  # ===========================================================================

  db:

    image: timescale/timescaledb:latest-pg15

    container_name: patrol_database

    environment:

      POSTGRES_DB: patrol_db

      POSTGRES_USER: admin

      POSTGRES_PASSWORD: password123

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

    networks:

      - patrol_network

  # ===========================================================================
  # Grafana Dashboard
  #
  # 역할
  #
  #   - 위험 이벤트 시각화
  #   - 센서 데이터 모니터링
  #   - AI 통계
  #   - 순찰 이력
  #
  # 접속
  #
  #   http://localhost:3000
  #
  # 구현 단계
  #
  #   Level 6
  # ===========================================================================

  dashboard:

    image: grafana/grafana:latest

    container_name: safety_dashboard

    ports:

      - "3000:3000"

    environment:

      GF_SECURITY_ADMIN_USER: admin

      GF_SECURITY_ADMIN_PASSWORD: admin

    depends_on:

      - db

    volumes:

      - grafana_data:/var/lib/grafana

    networks:

      - patrol_network

# =============================================================================
# Docker Network
#
# 모든 컨테이너가 같은 가상 네트워크에서 통신
#
# robot_sim
# teleop
# db
# dashboard
# =============================================================================

networks:

  patrol_network:

    driver: bridge

# =============================================================================
# Docker Persistent Volume
#
# 컨테이너를 삭제해도 데이터 유지
# =============================================================================

volumes:

  # PostgreSQL 데이터
  postgres_data:

  # Grafana 설정 및 Dashboard
  grafana_data: